name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: pip install -e '.[manage,dev]'

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring

  test-sdk:
    name: Test SDK / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK and test dependencies
        run: |
          cd sdk-pkg
          pip install -e '.[dev]' 2>/dev/null || pip install -e .
          pip install pytest

      - name: Run SDK tests
        run: |
          cd sdk-pkg
          pytest tests/ -v --tb=short

  lint:
    name: Lint & syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Python syntax check (main package)
        run: find src -name '*.py' | xargs python -m py_compile

      - name: Python syntax check (SDK)
        run: find sdk-pkg/leafhub_sdk -name '*.py' | xargs python -m py_compile

      - name: Shell script syntax
        run: |
          for f in install.sh setup.sh register.sh; do
            [ -f "$f" ] && bash -n "$f" && echo "$f: syntax OK"
          done

      - name: PS1 ASCII enforcement
        run: |
          for f in install.ps1 setup.ps1; do
            [ -f "$f" ] || continue
            if grep -Pq '[^\x00-\x7F]' "$f"; then
              echo "ERROR: $f contains non-ASCII characters"
              grep -Pn '[^\x00-\x7F]' "$f"
              exit 1
            fi
            echo "$f: ASCII OK"
          done

  ps1-syntax:
    name: PowerShell syntax check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Validate PS1 files
        shell: pwsh
        run: |
          foreach ($file in @("install.ps1", "setup.ps1")) {
            if (-not (Test-Path $file)) { continue }
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              "$PWD/$file", [ref]$null, [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              exit 1
            }
            Write-Host "$file syntax OK"
          }

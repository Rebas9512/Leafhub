name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test / ${{ matrix.os }} / Python ${{ matrix.python-version }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash   # consistent shell across all three platforms

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: pip install -e '.[manage,dev]'

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Suppress keychain dialogs / prompts in headless CI runners.
          # Tests inject LEAFHUB_MASTER_KEY via fixtures so keyring is never
          # actually called — this is a belt-and-suspenders guard.
          PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring

  lint:
    name: Lint & syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: PS1 ASCII enforcement
        run: |
          for f in install.ps1; do
            if grep -Pq '[^\x00-\x7F]' "$f"; then
              echo "ERROR: $f contains non-ASCII characters"
              grep -Pn '[^\x00-\x7F]' "$f"
              exit 1
            fi
            echo "$f: ASCII OK"
          done

      - name: Shell script syntax
        run: |
          for f in install.sh setup.sh; do
            [ -f "$f" ] && bash -n "$f" && echo "$f: syntax OK"
          done

  ps1-syntax:
    name: PowerShell syntax check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Validate install.ps1
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/install.ps1", [ref]$null, [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          Write-Host "install.ps1 syntax OK"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test / ${{ matrix.os }} / Python ${{ matrix.python-version }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash   # consistent shell across all three platforms

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: pip install -e '.[manage,dev]'

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Suppress keychain dialogs / prompts in headless CI runners.
          # Tests inject LEAFHUB_MASTER_KEY via fixtures so keyring is never
          # actually called — this is a belt-and-suspenders guard.
          PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
